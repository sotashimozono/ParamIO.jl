# sweep_order を TOML で明示的に指定する例
[study]
project_name  = "test_sweep_order"
total_samples = 1
outdir        = "out"

[datavault]
path_keys   = ["system.N", "system.chi", "model.g", "model.h"]
sweep_order = ["model.h", "system.N", "system.chi", "model.g"]

[[paramsets]]

[paramsets.system]
N   = [24, 48]
chi = 40

[paramsets.model]
g = [0.5, 1.0]
h = [0.0, 0.01]
